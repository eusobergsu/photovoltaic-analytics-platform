services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: photo_user
      POSTGRES_PASSWORD: photo_password
      POSTGRES_DB: photo_user
    ports:
      - "5432:5432"